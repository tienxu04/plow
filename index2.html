<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Player v6 - Perfect Resume</title>
    <style>
        :root {
            --primary-color: #1b3022;
            --accent-color: #8da399;
            --highlight: #d4a373;
            --bg-color: #f0f2f1;
            --container-bg: #ffffff;
        }
        body { font-family: 'Georgia', serif; background: var(--bg-color); padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: var(--container-bg); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary-color); position: relative; }
        
        /* Nút Resume lớn khi mới vào trang */
        #initialOverlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }
        #initialOverlay button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 { text-align: center; color: var(--primary-color); font-size: 1.4rem; margin-bottom: 20px; }
        #audioPlayer { width: 100%; height: 50px; margin-bottom: 15px; }
        
        .extra-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; }
        .extra-controls button { background: var(--primary-color); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .extra-controls select { padding: 9px; border-radius: 5px; border: 1px solid var(--accent-color); font-size: 0.8rem; }

        .status-bar { background: #f8f9fa; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; border-left: 4px solid var(--accent-color); }
        .chapter-list { list-style: none; padding: 0; margin: 0; max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        .chapter-list li { padding: 15px; border-bottom: 1px solid #f1f1f1; cursor: pointer; display: flex; justify-content: space-between; }
        .chapter-list li.active { background-color: var(--primary-color); color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="initialOverlay">
        <p id="resumeTxt" style="margin-bottom: 15px; font-weight: bold; color: var(--primary-color);"></p>
        <button onclick="startFromLastPlayed()">Tiếp tục nghe ▶️</button>
    </div>

    <h1>Drive Your Plow Over the Bones of the Dead</h1>
    
    <audio id="audioPlayer" controls></audio>
    
    <div class="extra-controls">
        <button onclick="skip(-10)">⏪ -10s</button>
        <button onclick="skip(10)">+10s ⏩</button>
        <select id="speedSelect" onchange="changeSpeed(this.value)">
            <option value="1">1.0x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="1.75">1.75x</option>
            <option value="2">2.0x</option>
        </select>
    </div>

    <div class="status-bar">
        <strong>Đang phát:</strong> <span id="currentTitle">...</span>
    </div>

    <ul class="chapter-list" id="chapterList"></ul>
</div>

<script>
    const audioPlayer = document.getElementById('audioPlayer');
    const speedSelect = document.getElementById('speedSelect');
    const chapterListElement = document.getElementById('chapterList');
    const initialOverlay = document.getElementById('initialOverlay');
    const resumeTxt = document.getElementById('resumeTxt');

    const BOOK_KEY = 'plow_bones_master_v6';
    const totalFiles = 18;
    const chapters = [];
    let currentIdx = 0;
    let targetTime = 0;
    let currentSpeed = 1;

    for (let i = 1; i <= totalFiles; i++) {
        let num = i.toString().padStart(2, '0');
        chapters.push({ index: i - 1, title: `Chapter ${i}`, file: `${num}.mp3` });
    }

    chapters.forEach((ch, idx) => {
        const li = document.createElement('li');
        li.id = `ch-${idx}`;
        li.innerHTML = `<span>${ch.title}</span>`;
        li.onclick = () => { initialOverlay.style.display = 'none'; loadAndPlay(idx, 0, true); };
        chapterListElement.appendChild(li);
    });

    function loadAndPlay(index, startTime = 0, autoPlay = false) {
        if (index < 0 || index >= chapters.length) return;
        currentIdx = index;
        targetTime = startTime;
        
        const chapter = chapters[index];
        document.getElementById('currentTitle').textContent = chapter.title;
        document.querySelectorAll('.chapter-list li').forEach(el => el.classList.remove('active'));
        document.getElementById(`ch-${index}`).classList.add('active');
        document.getElementById(`ch-${index}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        audioPlayer.src = chapter.file;
        audioPlayer.load();

        if (autoPlay) {
            // Sử dụng settimeout để đảm bảo src đã sẵn sàng
            setTimeout(() => { 
                audioPlayer.play().catch(e => {
                    console.log("Cần nhấn nút để cấp quyền phát nhạc");
                });
            }, 150);
        }
    }

    audioPlayer.addEventListener('loadedmetadata', () => {
        if (targetTime > 0) {
            audioPlayer.currentTime = targetTime;
            targetTime = 0;
        }
        audioPlayer.playbackRate = currentSpeed;
    });

    function startFromLastPlayed() {
        initialOverlay.style.display = 'none';
        const saved = localStorage.getItem(BOOK_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            loadAndPlay(data.index, data.time, true);
        } else {
            loadAndPlay(0, 0, true);
        }
    }

    function changeSpeed(speed) {
        currentSpeed = parseFloat(speed);
        audioPlayer.playbackRate = currentSpeed;
        saveProgress();
    }

    function skip(seconds) {
        audioPlayer.currentTime += seconds;
        saveProgress();
    }

    function saveProgress() {
        if (audioPlayer.currentTime >= 0) {
            localStorage.setItem(BOOK_KEY, JSON.stringify({
                index: currentIdx,
                time: audioPlayer.currentTime,
                speed: currentSpeed
            }));
        }
    }

    function checkProgressOnLoad() {
        const saved = localStorage.getItem(BOOK_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            currentSpeed = data.speed || 1;
            speedSelect.value = currentSpeed;
            
            const mins = Math.floor(data.time / 60);
            const secs = Math.floor(data.time % 60);
            resumeTxt.textContent = `Bạn đang nghe dở Chương ${data.index + 1} tại ${mins}p ${secs}s`;
            initialOverlay.style.display = 'flex';
            
            // Load ngầm để hiển thị giao diện đúng chương
            loadAndPlay(data.index, data.time, false);
        } else {
            loadAndPlay(0, 0, false);
        }
    }

    audioPlayer.onended = () => loadAndPlay(currentIdx + 1, 0, true);
    audioPlayer.onpause = saveProgress;
    audioPlayer.ontimeupdate = () => { if (Math.floor(audioPlayer.currentTime) % 2 === 0) saveProgress(); };

    window.onload = checkProgressOnLoad;
</script>
</body>
</html>
