<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Player v4 - Olga Tokarczuk</title>
    <style>
        :root {
            --primary-color: #1b3022;
            --accent-color: #8da399;
            --highlight: #d4a373;
            --bg-color: #f0f2f1;
            --container-bg: #ffffff;
        }
        body { font-family: 'Georgia', serif; background: var(--bg-color); padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: var(--container-bg); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary-color); }
        h1 { text-align: center; color: var(--primary-color); font-size: 1.4rem; margin-bottom: 5px; }
        .author { text-align: center; font-style: italic; color: var(--accent-color); margin-bottom: 20px; }
        
        #audioPlayer { width: 100%; height: 50px; margin-bottom: 10px; }
        .extra-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; }
        .extra-controls button { background: var(--primary-color); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .extra-controls select { padding: 7px; border-radius: 5px; border: 1px solid var(--accent-color); font-size: 0.8rem; cursor: pointer; }

        .status-bar { background: #f8f9fa; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; border-left: 4px solid var(--accent-color); }
        .chapter-list { list-style: none; padding: 0; margin: 0; max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        .chapter-list li { padding: 15px; border-bottom: 1px solid #f1f1f1; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .chapter-list li.active { background-color: var(--primary-color); color: #fff; font-weight: bold; }
        .playing-indicator { display: none; color: var(--highlight); font-size: 0.8rem; }
        .active .playing-indicator { display: inline; }
        .chapter-list::-webkit-scrollbar { width: 6px; }
        .chapter-list::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Drive Your Plow Over the Bones of the Dead</h1>
    <div class="author">Olga Tokarczuk</div>
    
    <audio id="audioPlayer" controls></audio>
    
    <div class="extra-controls">
        <button onclick="skip(-10)">⏪ -10s</button>
        <button onclick="skip(10)">+10s ⏩</button>
        <label for="speedSelect" style="font-size: 0.8rem;">Tốc độ:</label>
        <select id="speedSelect" onchange="changeSpeed(this.value)">
            <option value="1">1.0x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="1.75">1.75x</option>
            <option value="2">2.0x</option>
        </select>
    </div>

    <div class="status-bar">
        <strong>Đang phát:</strong> <span id="currentTitle">...</span>
        <div id="resumeStatus" style="font-size: 0.8rem; color: var(--highlight); margin-top: 5px; font-weight: bold;"></div>
    </div>

    <ul class="chapter-list" id="chapterList"></ul>
</div>

<script>
    const audioPlayer = document.getElementById('audioPlayer');
    const speedSelect = document.getElementById('speedSelect');
    const chapterListElement = document.getElementById('chapterList');
    const currentTitleElement = document.getElementById('currentTitle');
    const resumeStatusElement = document.getElementById('resumeStatus');

    const BOOK_KEY = 'plow_bones_master_v4';
    const totalFiles = 18;
    const chapters = [];
    let currentIdx = 0;
    let targetTime = 0;
    let currentSpeed = 1;

    for (let i = 1; i <= totalFiles; i++) {
        let num = i.toString().padStart(2, '0');
        chapters.push({ index: i - 1, title: `Chapter ${i}`, file: `${num}.mp3` });
    }

    chapters.forEach((ch, idx) => {
        const li = document.createElement('li');
        li.id = `ch-${idx}`;
        li.innerHTML = `<span>${ch.title}</span> <span class="playing-indicator">🔊 Playing</span>`;
        li.onclick = () => loadAndPlay(idx, 0, true);
        chapterListElement.appendChild(li);
    });

    function loadAndPlay(index, startTime = 0, autoPlay = false) {
        if (index < 0 || index >= chapters.length) return;
        currentIdx = index;
        targetTime = startTime;
        
        const chapter = chapters[index];
        currentTitleElement.textContent = chapter.title;
        document.querySelectorAll('.chapter-list li').forEach(el => el.classList.remove('active'));
        document.getElementById(`ch-${index}`).classList.add('active');
        document.getElementById(`ch-${index}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        audioPlayer.src = chapter.file;
        audioPlayer.load();

        if (autoPlay) {
            audioPlayer.play().catch(() => console.log("Chờ tương tác..."));
        }
    }

    audioPlayer.addEventListener('loadedmetadata', () => {
        if (targetTime > 0) {
            audioPlayer.currentTime = targetTime;
            targetTime = 0;
        }
        audioPlayer.playbackRate = currentSpeed; // Áp dụng tốc độ đã lưu
    });

    function changeSpeed(speed) {
        currentSpeed = parseFloat(speed);
        audioPlayer.playbackRate = currentSpeed;
        saveProgress();
    }

    function skip(seconds) {
        audioPlayer.currentTime += seconds;
        saveProgress();
    }

    function saveProgress() {
        if (audioPlayer.currentTime >= 0) {
            localStorage.setItem(BOOK_KEY, JSON.stringify({
                index: currentIdx,
                time: audioPlayer.currentTime,
                speed: currentSpeed
            }));
        }
    }

    function loadProgress() {
        const saved = localStorage.getItem(BOOK_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            currentSpeed = data.speed || 1;
            speedSelect.value = currentSpeed; // Cập nhật dropdown UI
            
            const mins = Math.floor(data.time / 60);
            const secs = Math.floor(data.time % 60);
            resumeStatusElement.textContent = `↩️ Khôi phục: ${mins}p ${secs}s | Tốc độ: ${currentSpeed}x`;
            loadAndPlay(data.index, data.time, false);
            setTimeout(() => { resumeStatusElement.textContent = ""; }, 6000);
        } else {
            loadAndPlay(0, 0, false);
        }
    }

    audioPlayer.onended = () => loadAndPlay(currentIdx + 1, 0, true);
    audioPlayer.onpause = saveProgress;
    audioPlayer.ontimeupdate = () => { if (Math.floor(audioPlayer.currentTime) % 2 === 0) saveProgress(); };

    window.onload = loadProgress;
</script>
</body>
</html>
